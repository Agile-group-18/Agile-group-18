name: Merge main to dev

on:
  schedule:
    - cron: '0 9 * * 5'  # Every Friday at 09:00 UTC
  workflow_dispatch:       # Allow manual trigger for testing

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "dev"
          destination_branch: "main"
          pr_title: "chore: weekly merge dev → main (${{ github.run_id }})"
          pr_body: |
            ## 🗓️ Weekly Automated PR
            
            This PR was automatically created by the weekly schedule workflow.
            
            **Source:** `dev`  
            **Target:** `main`  
            **Triggered:** ${{ github.event.schedule || 'manual' }}
            
            Please review and merge.
          pr_label: "automated-pr"
          pr_allow_empty: false
          github_token: ${{ secrets.GITHUB_TOKEN }}
