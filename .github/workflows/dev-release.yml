name: Upload pre-release binary

on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload Pre-Release to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "dev-${{ steps.vars.outputs.sha_short }}"
          name: "Dev Pre-Release (${{ steps.vars.outputs.sha_short }})"
          body: |
            **Automated pre-release build from `dev` branch**
            
            Commit: `${{ github.sha }}`
            Triggered by: @${{ github.actor }}
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
